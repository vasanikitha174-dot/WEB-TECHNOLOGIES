<!DOCTYPE html>
<html>
<head>
    <title>Bank Loan EMI Calculator</title>
    <script>
        function calculateEMI() {
            var name = document.getElementById("name").value;
            var occupation = document.getElementById("occupation").value;
            var P = parseFloat(document.getElementById("loan").value);
            var annualRate = parseFloat(document.getElementById("rate").value);
            var years = parseFloat(document.getElementById("tenure").value);

            var r = annualRate / (12 * 100);
            var n = years * 12;

            var emi = (P * r * Math.pow(1 + r, n)) /
                      (Math.pow(1 + r, n) - 1);

            document.getElementById("result").innerHTML =
                "<h3>Loan Details</h3>" +
                "Name: " + name + "<br>" +
                "Occupation: " + occupation + "<br>" +
                "Monthly EMI: ₹" + emi.toFixed(2);
        }
    </script>
</head>

<body>
    <h2 align="center">Bank Loan EMI Calculator</h2>

    <form onsubmit="calculateEMI(); return false;">
        <table align="center" cellpadding="8">

            <tr>
                <td>Name</td>
                <td><input type="text" id="name" required></td>
            </tr>

            <tr>
                <td>Occupation</td>
                <td><input type="text" id="occupation" required></td>
            </tr>

            <tr>
                <td>Loan Amount (₹)</td>
                <td><input type="number" id="loan" required></td>
            </tr>

            <tr>
                <td>Rate of Interest (%)</td>
                <td><input type="number" id="rate" step="0.01" required></td>
            </tr>

            <tr>
                <td>Tenure (Years)</td>
                <td><input type="number" id="tenure" required></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Calculate EMI">
                    <input type="reset" value="Clear">
                </td>
            </tr>

        </table>
    </form>

    <div id="result" align="center"></div>

</body>
</html>
